name: Release

# Trigger on any tag that looks like a semantic version.
on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write   # needed to create a release and upload assets
  packages: write   # needed to push Docker images to GHCR

jobs:
  # ── Cross-compile binaries for every supported target ────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native Linux x86_64 — no cross-compiler needed
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
            rust_targets: x86_64-unknown-linux-gnu
            toolchain: stable

          # Linux aarch64 with glibc — cross via Docker
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
            rust_targets: ""
            toolchain: stable

          # Linux aarch64 with musl (fully static) — cross via Docker
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            rust_targets: ""
            toolchain: stable

          # Linux MIPS LE with musl (OpenWrt / embedded) — cross via Docker
          - target: mipsel-unknown-linux-musl
            runner: ubuntu-latest
            use_cross: true
            rust_targets: ""
            toolchain: nightly

          # macOS Apple Silicon — native arm64 runner
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
            rust_targets: aarch64-apple-darwin
            toolchain: stable

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Install `cross` only on Linux jobs that need it.
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build expose-server
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            if [ "${{ matrix.target }}" = "mipsel-unknown-linux-musl" ]; then
              cross build --release --target ${{ matrix.target }} -p expose-server -Z build-std=std,panic_abort
            else
              cross build --release --target ${{ matrix.target }} -p expose-server
            fi
          else
            cargo build --release --target ${{ matrix.target }} -p expose-server
          fi

      - name: Build expose-client
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            if [ "${{ matrix.target }}" = "mipsel-unknown-linux-musl" ]; then
              cross build --release --target ${{ matrix.target }} -p expose-client -Z build-std=std,panic_abort
            else
              cross build --release --target ${{ matrix.target }} -p expose-client
            fi
          else
            cargo build --release --target ${{ matrix.target }} -p expose-client
          fi

      - name: Package binaries as gzip
        shell: bash
        run: |
          mkdir -p dist
          gzip -9 -c target/${{ matrix.target }}/release/expose-server \
            > dist/expose-server-${{ matrix.target }}.gz
          gzip -9 -c target/${{ matrix.target }}/release/expose-client \
            > dist/expose-client-${{ matrix.target }}.gz

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.gz
          # Create the release automatically if it doesn't exist yet
          # (e.g. when the tag was pushed directly rather than through the UI).
          generate_release_notes: true

      # Upload gzip'd binaries as workflow artifacts so the docker job can
      # reuse them without re-building.  Only the two Linux-glibc targets
      # are needed for the multi-platform Docker image.
      - name: Upload artifact for Docker build
        if: matrix.target == 'x86_64-unknown-linux-gnu' || matrix.target == 'aarch64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*.gz
          retention-days: 1

  # ── Build and push multi-platform Docker image ───────────────────────────────
  docker:
    name: Docker build and push
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download amd64 binaries
        uses: actions/download-artifact@v4
        with:
          name: release-x86_64-unknown-linux-gnu
          path: dist-x86_64

      - name: Download arm64 binaries
        uses: actions/download-artifact@v4
        with:
          name: release-aarch64-unknown-linux-gnu
          path: dist-aarch64

      - name: Prepare binaries for Docker build
        run: |
          mkdir -p dist
          gunzip -c dist-x86_64/expose-server-x86_64-unknown-linux-gnu.gz > dist/expose-server-amd64
          gunzip -c dist-x86_64/expose-client-x86_64-unknown-linux-gnu.gz > dist/expose-client-amd64
          gunzip -c dist-aarch64/expose-server-aarch64-unknown-linux-gnu.gz > dist/expose-server-arm64
          gunzip -c dist-aarch64/expose-client-aarch64-unknown-linux-gnu.gz > dist/expose-client-arm64
          chmod +x dist/*

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
